alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: DICE
serviceCategory: Ticketing and Events
billingModel:
  pricingCategory: Commission-Based
  billingFrequency: Per Transaction
  billingCurrency: Multiple
  chargeCategories:
  - Usage
  - Adjustment
focusColumns:
  ServiceName: DICE Ticketing
  ServiceCategory: Ticketing and Events
  ProviderName: DICE
  PublisherName: DICE
  InvoiceIssuerName: DICE
  BillingCurrency: Multiple
  ChargeCategory: Usage
  PricingCategory: Commission-Based
meters:
- name: ticket_commission
  description: Booking fee / commission DICE earns per ticket sold, surfaced as commission and diceCommission in the API.
  unit: tickets
  aggregation: sum
  dimensions:
  - event
  - ticketType
  - salesChannel
- name: refund_returns
  description: Returned tickets and refunds that adjust net sales, read from the Return entity.
  unit: tickets
  aggregation: sum
  dimensions:
  - event
  - order
- name: integration_compute
  description: Partner-side infrastructure cost to query and process API data (no DICE invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Pull tickets and orders with commission and diceCommission fields to see per-event, per-channel booking economics; track returns for net figures.
- name: Allocation
  description: Attribute sales and commission by event, ticket type, and sales channel to map revenue to shows and campaigns.
- name: Optimization
  description: Page with cursors and date-range filters to pull only needed rows, reducing partner-side compute and query overhead.
- name: Accountability
  description: Assign an owner per event or partner account to reconcile API-reported sales, commissions, and returns against DICE settlements.
maintainers:
