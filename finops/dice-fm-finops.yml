description: >-
  FinOps view of the DICE partner relationship. The DICE Ticket Holders GraphQL
  API carries no separate published usage fee - it is provided to onboarded DICE
  partners. The relevant spend / revenue flow is ticketing: DICE earns a booking
  fee / commission on tickets sold, surfaced in the API as commission and
  diceCommission on tickets and orders. For a partner consuming the API, cost is
  primarily their own integration and infrastructure to pull and process the data,
  not a DICE API invoice.
notes: >-
  DICE does not publish per-call API pricing; commercial terms are per partner
  agreement. The commission and diceCommission fields in the API are the primary
  data points for reconciling event finances. Verify partner terms with DICE
  during reconciliation.
sources:
- https://dice.fm/partners
- https://mio.dice.fm/
